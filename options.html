<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>NoMoreLie Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="options-container">
    <h1>NoMoreLie Settings</h1>

    <section>
      <h2>Provider</h2>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="provider" value="groq" checked>
          <span>Groq (Free tier)</span>
          <small>Cloud-based, requires free API key</small>
        </label>
        <label class="radio-label">
          <input type="radio" name="provider" value="ollama">
          <span>Ollama (Local)</span>
          <small>Runs on your machine, fully offline</small>
        </label>
      </div>
    </section>

    <section id="groqSection">
      <h2>Groq Configuration</h2>
      <div class="field">
        <label for="groqApiKey">API Key</label>
        <input type="password" id="groqApiKey" placeholder="gsk_...">
        <small>Get a free key at <a href="https://console.groq.com/keys" target="_blank">console.groq.com</a></small>
      </div>
      <div class="field">
        <label for="groqModel">Model</label>
        <select id="groqModel">
          <option value="llama-3.3-70b-versatile">Llama 3.3 70B (Recommended)</option>
          <option value="llama-3.1-8b-instant">Llama 3.1 8B (Faster)</option>
          <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
        </select>
      </div>
    </section>

    <section id="ollamaSection" style="display:none;">
      <h2>Ollama Configuration</h2>
      <div class="field">
        <label for="ollamaBaseUrl">Server URL</label>
        <input type="text" id="ollamaBaseUrl" placeholder="http://localhost:11434">
      </div>
      <div class="field">
        <label for="ollamaModel">Model</label>
        <input type="text" id="ollamaModel" placeholder="llama3">
        <small>Must be pulled locally (run: ollama pull llama3)</small>
      </div>
    </section>

    <div class="actions">
      <button id="saveBtn" class="primary">Save Settings</button>
      <span id="saveStatus"></span>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
